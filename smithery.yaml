startCommand:
  type: stdio
  configSchema:
    type: object
    required:
      - cantripApiKey
    properties:
      cantripApiKey:
        type: string
        description: "Cantrip API key from https://dashboard.cantrip.ai"
  commandFunction: |
    (config) => ({
      command: 'npx',
      args: ['-y', 'mcp-server-cantrip'],
      env: {
        CANTRIP_API_KEY: config.cantripApiKey
      }
    })
